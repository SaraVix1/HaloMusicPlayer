<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src-tauri/icons/32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halo</title>
    <style>
      /* Explicit height chain so h-full resolves to the viewport height in both
         windows. Without this, WebKitGTK derives html/body height from content,
         causing the mini player to grow taller than its 30 px GTK window when
         Linux font metrics make the content slightly larger than on Windows. */
      html { height: 100%; background: oklch(1 0 0); overflow: hidden; }
      html.dark { background: oklch(0.145 0 0); }
      body { height: 100%; background: inherit; margin: 0; overflow: hidden; }
      #root { height: 100%; overflow: hidden; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
